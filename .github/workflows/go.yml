# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Setup cross compiler
      if: matrix.arch == 'arm64'
      run: |
        sudo apt update
        sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

    - name: Download dependence
      run: go mod tidy
      
    - name: Build
      env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }} 
          CXX: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-g++' || 'g++' }}
          GOFLAGS: "-tags=linux,${{ matrix.arch }}"
      run: go build -v -ldflags "-linkmode external -extldflags '-static -s -w'" -o EasierConnect_${{matrix.arch}}-linux-static

    - name: Test
      run: file EasierConnect_${{matrix.arch}}-linux-static

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: EasierConnect-${{matrix.arch}}-linux
        path: EasierConnect_${{matrix.arch}}-linux-static
